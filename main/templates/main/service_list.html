{% load static %}

<!DOCTYPE HTML>
<!--

	html5up.net | @ajlkn
	Free for personal and commercial use under the CCA 3.0 license (html5up.net/license)
-->
<html>
	<head>
		<title>Hyperspace - Services</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
        <noscript><link rel="stylesheet" href="{% static 'assets/css/noscript.css' %}"></noscript>
	</head>
	<body class="is-preload">

		<!-- Header -->
			<header id="header">
				<a href="{% url 'index' %}" class="title">Hyperspace</a>
				<nav>
					<ul>
						<li><a href="{% url 'service_list' %}" class="active">Services</a></li>
					</ul>
				</nav>
			</header>

		<!-- Wrapper -->
			<div class="wrapper" style="margin-top: 3em;">

                {% for service in services %}
				<section style="padding-left: 4em;">
					<div class="content">
						<div class="inner">
							<h2>{{ service.title }}</h2>
							<p>{{ service.description|truncatechars:50 }}</p>
							<ul class="actions">
								<li><a href="{% url 'service_detail' service.slug %}" class="button">Learn more</a></li>
							</ul>
						</div>
					</div>
				</section>
				{% endfor %}

			</div>

		<!-- Footer -->
			<footer id="footer" class="wrapper alt">
				<div class="inner">
					<ul class="menu">
						<li>&copy; Untitled. All rights reserved.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
					</ul>
				</div>
			</footer>


        <!-- Scripts -->
		<script src="{% static 'assets/js/jquery.min.js' %}"></script>
		<script src="{% static 'assets/js/jquery.scrollex.min.js' %}"></script>
		<script src="{% static 'assets/js/jquery.scrolly.min.js' %}"></script>
		<script src="{% static 'assets/js/browser.min.js' %}"></script>
		<script src="{% static 'assets/js/breakpoints.min.js' %}"></script>
		<script src="{% static 'assets/js/util.js' %}"></script>
		<script src="{% static 'assets/js/main.js' %}"></script>

	</body>
</html>
